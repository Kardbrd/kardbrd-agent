# kardbrd.yml — MBPBot workflow rules for Agents & Clients board
#
# Board has 3 lists: To Do, In Progress, Done
# The "Explore and plan" rule uses assignee to scope to MBPBot-assigned cards.
# Other list-based rules use require_label: Agent for multi-agent scoping.
# @mentions always work regardless of labels or assignees.
#
# Reaction rules use require_user to restrict who can trigger actions.
# Paul's user ID: E21K9jmv
# MBPBot's user ID: NpjMZJO5
---
board_id: 0gl5MlBZ
agent: MBPBot
api_url: http://app.kardbrd.com

rules:
  # ── Stop active agent session ──────────────────────────────────
  - name: Stop agent
    event: reaction_added
    emoji: "🛑"
    action: __stop__

  # ── List-based workflow ───────────────────────────────────────

  # Card lands in To Do → explore and plan (only if assigned to MBPBot)
  - name: Explore and plan new cards
    event:
      - card_created
      - card_moved
    list: To Do
    assignee:
      - __self__
    model: opus
    action: /explore

  # Card moves to In Progress → implement
  - name: Implement on move to In Progress
    event: card_moved
    list: In Progress
    require_label: Agent
    model: sonnet
    action: /implement

  # ── Reaction-based triggers ────────────────────────────────────

  # ✅ reaction → review and merge PR
  - name: Ship card via approval
    event: reaction_added
    emoji: "✅"
    require_label: Agent
    require_user: E21K9jmv
    model: sonnet
    action: |
      The operator approved this card by reacting with ✅.
      Ship this card to production (merge the PR into main):
      1. Run `git status` and `git log --oneline main..HEAD` to see what's on this branch
      2. If there are uncommitted changes, commit them
      3. Push the branch to origin: `git push -u origin HEAD`
      4. Create a PR if one doesn't exist using gh pr create
         with the card title and ID
      5. Merge the PR: `gh pr merge --squash --delete-branch`
      6. Post a comment on the card confirming the merge with the PR URL and merge commit
